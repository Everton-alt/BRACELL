<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Importador</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <input type="file" id="fileInput">
    <button onclick="processar()">Enviar para o Supabase</button>

    <script>
        const supabase = supabase.createClient(
            'https://kdbrlmvcxzgwylpdcfmq.supabase.co', 
            'sb_publishable_MJfMXMVTTzR06FrDoZcx-A_ULkcUtxg'
        );

        async function processar() {
            console.log("Iniciando...");
            const fileInput = document.getElementById('fileInput');
            if (!fileInput.files[0]) {
                return alert("Selecione um arquivo!");
            }

            const reader = new FileReader();
            reader.onload = async function(e) {
                try {
                    const text = e.target.result;
                    const rows = text.split('\n').slice(1);
                    const data = rows.filter(r => r.trim() !== "").map(row => {
                        const [c1, c2, c3, c4, c5, c6, c7, c8] = row.split(',');
                        return { codigo_antigo: c1, codigo_novo: c2, descricao: c3, umb: c4, documento: c5, lote: c6, ano: parseInt(c7), impressora: c8 };
                    });

                    console.log("Enviando dados:", data);
                    const { data: result, error } = await supabase.from('etiquetas').insert(data);
                    
                    if (error) {
                        console.error("Erro Supabase:", error);
                        alert("Erro Supabase: " + error.message);
                    } else {
                        alert("Dados enviados com sucesso!");
                    }
                } catch (err) {
                    alert("Erro no código: " + err.message);
                }
            };
            reader.readAsText(fileInput.files[0]);
        }
    </script>
</body>
</html>
