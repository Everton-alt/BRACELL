<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Importador de Etiquetas</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f3; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #2c3e50; margin-bottom: 25px; }
        input { margin-bottom: 20px; }
        button { background: #27ae60; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Upload de Etiquetas</h2>
        <input type="file" id="fileInput" accept=".csv">
        <button onclick="processar()">Enviar para o Supabase</button>
    </div>
    <script>
        const supabase = supabase.createClient('https://kdbrlmvcxzgwylpdcfmq.supabase.co', 'sb_publishable_MJfMXMVTTzR06FrDoZcx-A_ULkcUtxg');
        async function processar() {
            const file = document.getElementById('fileInput').files[0];
            const reader = new FileReader();
            reader.onload = async function(e) {
                const rows = e.target.result.split(/\r?\n/).slice(1).filter(r => r.trim());
                const data = rows.map(r => {
                    const c = r.split(r.includes(';') ? ';' : ',');
                    return { codigo_antigo: c[0], codigo_novo: c[1], descricao: c[2], umb: c[3], documento: c[4], lote: c[5], ano: parseInt(c[6]), impressora: c[7] };
                });
                const { error } = await supabase.from('etiquetas').insert(data);
                if (error) alert("Erro: " + error.message); else alert("Sucesso!");
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
